name: CI/CD Deploy (site + runtime snapshots)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, k3s-demo]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy locally on server (install site + refresh snapshots)
        run: |
          set -euo pipefail

          echo "== whoami / perms =="
          whoami
          id
          ls -ld /var/snap/caddy/common/site || true
          ls -ld /var/snap/caddy/common/site/evidence || true

          echo "== install site/index.html =="
          # 确保网页及证据目录存在
          mkdir -p /var/snap/caddy/common/site/evidence
          # 直接将仓库里的代码复制到 Caddy 的代理目录下
          install -m 0644 site/index.html /var/snap/caddy/common/site/index.html

          echo "== refresh evidence snapshots =="
          # 赋予脚本执行权限并在服务器本地直接执行
          chmod +x scripts/collect-snapshots.sh
          ./scripts/collect-snapshots.sh || true

          echo "== smoke test =="
          # 验证 Caddy 代理和网页是否存活
          curl -fsS http://127.0.0.1/ | head -n 2
          curl -fsS http://127.0.0.1/demo | head -n 2
          echo "OK"
