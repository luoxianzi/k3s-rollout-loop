name: CI/CD Deploy (site + runtime snapshots)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          source: "site/index.html,scripts/collect-snapshots.sh"
          target: "/tmp/shipit-deploy"

      - name: Deploy on server (install site + refresh snapshots)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "== install site/index.html =="
            install -m 0644 /tmp/shipit-deploy/site/index.html /var/snap/caddy/common/site/index.html

            echo "== refresh evidence snapshots =="
            install -m 0755 /tmp/shipit-deploy/scripts/collect-snapshots.sh /tmp/collect-snapshots.sh
            /tmp/collect-snapshots.sh || true

            echo "== smoke test =="
            curl -fsS http://127.0.0.1/ | head -n 2
            curl -fsS http://127.0.0.1/demo | head -n 2

            echo "OK"
